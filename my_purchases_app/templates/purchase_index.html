<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMBITS - Purchase Order</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4 sm:p-8" onload="initApp()">

    <div class="max-w-6xl mx-auto space-y-6">
        <div class="bg-indigo-700 p-6 rounded-2xl text-white shadow-lg flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold uppercase tracking-tight">SolarEco <span class="font-light opacity-80">Purchasing</span></h1>
                <p class="text-indigo-100 text-sm italic">External Supplier Procurement Portal</p>
            </div>
            <div class="text-right hidden sm:block">
                <p id="clock" class="text-xl font-mono font-bold"></p>
                <p class="text-xs opacity-75">March 7, 2026</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 space-y-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="font-bold text-slate-800 border-b pb-3 mb-4 text-sm uppercase tracking-wider">Procurement Details</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase">Supplier / Vendor</label>
                            <input list="supplier_list" id="supp" class="w-full border-2 border-slate-50 rounded-lg p-3 mt-1 outline-none focus:border-indigo-500 text-sm" placeholder="Search supplier...">
                            <datalist id="supplier_list"></datalist>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase">Target Company</label>
                            <select id="company" onchange="filterWarehouses()" class="w-full border-2 border-slate-50 rounded-lg p-2.5 mt-1 bg-white outline-none focus:border-indigo-500 text-sm"></select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase">Target Warehouse</label>
                            <select id="warehouse" onchange="fetchPriceAndStock()" class="w-full border-2 border-slate-50 rounded-lg p-2.5 mt-1 bg-white outline-none focus:border-indigo-500 text-sm"></select>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="font-bold text-slate-800 border-b pb-3 mb-4 text-sm uppercase tracking-wider">Timeline</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase">PO Date</label>
                            <input type="date" id="posting_date" class="w-full border-2 border-slate-50 rounded-lg p-2.5 mt-1 text-sm outline-none focus:border-indigo-500">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase">Expected Arrival</label>
                            <input type="date" id="delivery_date" class="w-full border-2 border-slate-50 rounded-lg p-2.5 mt-1 text-sm outline-none focus:border-indigo-500">
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3 space-y-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 min-h-[550px] flex flex-col">
                    
                    <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100 flex flex-wrap gap-3 items-end mb-6">
                        <div class="flex-grow min-w-[200px]">
                            <div class="flex justify-between items-center mb-1">
                                <label class="text-[10px] font-bold text-indigo-500 uppercase ml-1">Find Material / Product</label>
                                <span id="stock-display" class="text-[10px] font-bold bg-white text-indigo-600 px-2 py-0.5 rounded shadow-sm hidden"></span>
                            </div>
                            <input list="item_list" id="item_input" onchange="fetchPriceAndStock()" class="w-full border border-indigo-200 rounded-lg p-3 outline-none focus:ring-2 focus:ring-indigo-400 text-sm" placeholder="Search by SKU or Name...">
                            <datalist id="item_list"></datalist>
                        </div>
                        <div class="w-20">
                            <label class="block text-[10px] font-bold text-indigo-500 uppercase mb-1 ml-1">Qty</label>
                            <input type="number" id="qty" class="w-full border border-indigo-200 rounded-lg p-2.5 text-sm font-bold" value="1">
                        </div>
                        <div class="w-28">
                            <label class="block text-[10px] font-bold text-indigo-500 uppercase mb-1 ml-1">Buy Rate</label>
                            <input type="number" id="rate" class="w-full border border-indigo-200 rounded-lg p-2.5 text-sm" placeholder="0.00">
                        </div>
                        <button onclick="addToCart()" class="bg-indigo-600 text-white font-bold px-6 py-3 rounded-lg hover:bg-indigo-700 transition-all">Add</button>
                    </div>

                    <div class="flex-grow overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-[10px] font-bold text-slate-400 uppercase border-b">
                                    <th class="pb-3">Item Info</th>
                                    <th class="pb-3 px-2 text-center">Qty</th>
                                    <th class="pb-3">Unit Cost</th>
                                    <th class="pb-3">Total</th>
                                    <th class="pb-3 text-right">Action</th>
                                </tr>
                            </thead>
                            <tbody id="cart-body" class="text-sm"></tbody>
                        </table>
                    </div>

                    <div class="border-t pt-6 mt-6 flex justify-between items-end">
                        <div class="text-right w-full">
                            <p class="text-xs text-slate-400 font-bold uppercase">Estimated Total Cost</p>
                            <p id="grand-total" class="text-4xl font-black text-slate-800">₱0.00</p>
                            <button onclick="submitOrder()" id="submit-btn" class="mt-4 w-full md:w-64 bg-indigo-600 text-white font-black py-4 rounded-xl hover:bg-indigo-700 shadow-xl disabled:opacity-50 transition-all">
                                SUBMIT PURCHASE ORDER
                            </button>
                        </div>
                    </div>
                    <div id="status" class="mt-4 p-3 rounded-lg text-center text-xs font-bold hidden"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let cart = [];
        let allWarehouses = [];
        let itemCodeToName = {}; 
        let itemNameToCode = {}; 

        async function initApp() {
            updateClock();
            setInterval(updateClock, 1000);

            // Set default dates
            document.getElementById('posting_date').valueAsDate = new Date();
            let delivery = new Date();
            delivery.setDate(delivery.getDate() + 7);
            document.getElementById('delivery_date').valueAsDate = delivery;

            try {
                // FIXED: Using Blueprint path
                const response = await fetch('/purchases/api/metadata');
                const data = await response.json();
                
                allWarehouses = data.warehouses || [];
                
                // Populate Dropdowns
                fillDatalist('supplier_list', data.suppliers.map(s => s.name));
                fillSelect('company', data.companies.map(c => c.name));
                
                const itemDatalist = document.getElementById('item_list');
                itemDatalist.innerHTML = data.items.map(item => {
                    itemCodeToName[item.name] = item.item_name;
                    itemNameToCode[item.item_name] = item.name;
                    return `<option value="${item.name}">${item.item_name}</option>`;
                }).join('');

                filterWarehouses();
            } catch (err) { console.error("Init Error:", err); }
        }

        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }

        function filterWarehouses() {
            const selectedCompany = document.getElementById('company').value;
            const filtered = allWarehouses.filter(w => w.company === selectedCompany);
            document.getElementById('warehouse').innerHTML = filtered.map(w => `<option value="${w.name}">${w.name}</option>`).join('');
        }

        function fillDatalist(id, list) { 
            document.getElementById(id).innerHTML = list.map(v => `<option value="${v}">`).join(''); 
        }
        function fillSelect(id, list) { 
            document.getElementById(id).innerHTML = list.map(v => `<option value="${v}">${v}</option>`).join(''); 
        }

        async function fetchPriceAndStock() {
            const inputVal = document.getElementById('item_input').value;
            const itemCode = itemCodeToName[inputVal] ? inputVal : itemNameToCode[inputVal] || inputVal;
            const warehouse = document.getElementById('warehouse').value;
            
            if (!itemCode || !warehouse) return;

            try {
                // FIXED: Using Blueprint paths
                const [priceRes, stockRes] = await Promise.all([
                    fetch(`/purchases/api/price/${encodeURIComponent(itemCode)}`),
                    fetch(`/inventory/api/stock?item_code=${encodeURIComponent(itemCode)}&warehouse=${encodeURIComponent(warehouse)}`)
                ]);
                const priceData = await priceRes.json();
                const stockData = await stockRes.json();
                
                document.getElementById('rate').value = priceData.price || 0;
                const stockEl = document.getElementById('stock-display');
                stockEl.innerText = `STOCK: ${stockData.actual_qty || 0}`;
                stockEl.classList.remove('hidden');
            } catch (err) { console.error("Fetch Error:", err); }
        }

        function addToCart() {
            const inputVal = document.getElementById('item_input').value;
            const itemCode = itemCodeToName[inputVal] ? inputVal : itemNameToCode[inputVal] || inputVal;
            const qty = parseFloat(document.getElementById('qty').value);
            const rate = parseFloat(document.getElementById('rate').value);
            const warehouse = document.getElementById('warehouse').value;

            if (!itemCode || qty <= 0) return alert("Valid Item and Qty required");
            
            cart.push({ item_code: itemCode, qty, rate, warehouse });
            renderCart();
            document.getElementById('item_input').value = '';
        }

        function renderCart() {
            const tbody = document.getElementById('cart-body');
            let total = 0;
            tbody.innerHTML = cart.map((row, i) => {
                const lineTotal = row.qty * row.rate;
                total += lineTotal;
                return `
                    <tr class="border-b">
                        <td class="py-4 font-bold text-xs">${itemCodeToName[row.item_code] || row.item_code}</td>
                        <td class="text-center">${row.qty}</td>
                        <td>₱${row.rate.toFixed(2)}</td>
                        <td class="font-bold">₱${lineTotal.toFixed(2)}</td>
                        <td class="text-right"><button onclick="cart.splice(${i},1);renderCart()" class="text-red-500">✕</button></td>
                    </tr>`;
            }).join('');
            document.getElementById('grand-total').innerText = `₱${total.toLocaleString()}`;
        }

        async function submitOrder() {
            if (cart.length === 0) return;
            const btn = document.getElementById('submit-btn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            status.innerText = "TRANSMITTING...";
            status.classList.remove('hidden');

            const payload = {
                supplier: document.getElementById('supp').value,
                company: document.getElementById('company').value,
                transaction_date: document.getElementById('posting_date').value,
                schedule_date: document.getElementById('delivery_date').value,
                items: cart
            };

            try {
                // FIXED: Path matches Blueprint
                const response = await fetch('/purchases/api/submit', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (response.ok) {
                    status.innerText = "SUCCESS: " + result.message;
                    cart = []; renderCart();
                } else {
                    status.innerText = "ERROR: " + result.message;
                }
            } catch (err) { status.innerText = "FAILED: " + err.message; }
            finally { btn.disabled = false; }
        }
    </script>
</body>
</html>
