<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMBITS - Stock Report</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>
<body class="bg-slate-100 min-h-screen p-4 sm:p-8" onload="initReport()">

<div class="max-w-7xl mx-auto space-y-6">

  <!-- HEADER -->
  <div class="bg-slate-800 p-6 rounded-2xl text-white shadow-lg flex justify-between items-center border-b-4 border-emerald-500">
    <div class="flex items-center gap-4">
      <div>
        <h1 class="text-xl font-black uppercase tracking-tight">
            <span class="text-emerald-500">SMBITS</span> Master Stock
        </h1>
        <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">
          Enterprise Inventory Report
        </p>
      </div>
    </div>

    <div class="flex items-center gap-2">
      <a href="/"
        class="bg-slate-900/30 hover:bg-slate-900/50 px-3 py-2 rounded-lg text-[11px] font-bold uppercase tracking-wide">
        Home
      </a>
      <button onclick="refreshData()"
        class="bg-slate-900/30 hover:bg-slate-900/50 px-3 py-2 rounded-lg text-[11px] font-bold uppercase tracking-wide transition-all flex items-center gap-2">
        <i class="fa-solid fa-sync"></i> Refresh Data
      </button>
      <form method="POST" action="/logout">
        <button type="submit"
          class="bg-slate-900/30 hover:bg-slate-900/50 px-3 py-2 rounded-lg text-[11px] font-bold uppercase tracking-wide transition-all">
          Logout
        </button>
      </form>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 grid grid-cols-1 md:grid-cols-4 gap-4">

    <div>
      <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Company</label>
      <select id="filter-company" onchange="companyChanged()"
        class="w-full border border-slate-200 rounded-lg p-2 text-sm bg-slate-50 font-bold text-slate-700"></select>
    </div>

    <div>
      <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Warehouse</label>
      <select id="filter-warehouse" onchange="renderTable()"
        class="w-full border border-slate-200 rounded-lg p-2 text-sm bg-slate-50 text-slate-700">
        <option value="">All Warehouses</option>
      </select>
    </div>

    <div>
      <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Sort By</label>
      <select id="sort-by" onchange="renderTable()"
        class="w-full border border-slate-200 rounded-lg p-2 text-sm bg-slate-50 text-slate-700">
        <option value="item_name">Name (A-Z)</option>
        <option value="actual_qty">Stock Level (Low to High)</option>
        <option value="valuation_rate">Valuation (Buying Price)</option>
      </select>
    </div>

    <div>
      <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Search Items</label>
      <input type="text" id="search-box" oninput="renderTable()" placeholder="Type SKU or Name..."
        class="w-full border border-slate-200 rounded-lg p-2 text-sm bg-slate-50 focus:border-emerald-500 outline-none"/>
    </div>

  </div>

  <!-- TABLE -->
  <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">

    <div class="overflow-x-auto">
      <table class="w-full text-left">
        <thead class="bg-slate-50 border-b border-slate-100">
          <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
            <th class="px-6 py-4">Item Details</th>
            <th class="px-6 py-4">Warehouse</th>
            <th class="px-6 py-4 text-center">Stock Qty</th>
            <th class="px-6 py-4 text-right">Buying Rate</th>
            <th class="px-6 py-4 text-right">Selling Rate</th>
          </tr>
        </thead>
        <tbody id="report-body" class="divide-y divide-slate-50"></tbody>
      </table>
    </div>

    <!-- PAGINATION -->
    <div class="p-4 bg-slate-50 border-t flex justify-between items-center">
      <button id="prev-btn" onclick="changePage(-1)"
        class="px-4 py-2 bg-white border border-slate-200 rounded-lg text-xs font-bold shadow-sm hover:bg-slate-100 text-slate-600">
        <i class="fa-solid fa-chevron-left mr-2"></i> Previous
      </button>

      <div id="page-display" class="text-[10px] text-slate-400 font-black uppercase tracking-widest">
        Showing Items <span id="range-start">0</span> - <span id="range-end">0</span>
      </div>

      <button onclick="changePage(1)"
        class="px-4 py-2 bg-white border border-slate-200 rounded-lg text-xs font-bold shadow-sm hover:bg-slate-100 text-slate-600">
        Next <i class="fa-solid fa-chevron-right ml-2"></i>
      </button>
    </div>

    <div id="loading-overlay" class="hidden p-12 text-center text-slate-400 italic">
      <i class="fa-solid fa-spinner animate-spin mr-2"></i> Syncing with ERPNext...
    </div>

  </div>

  <div id="rate-status" class="hidden p-3 rounded-lg text-xs font-bold text-center"></div>

</div>

<script>
let fullStockData = []
let filteredData = []
let allWarehouses = []
let currentPage = 0
const pageSize = 20

function showRateStatus(message, ok = true) {
  const el = document.getElementById('rate-status')
  el.innerText = message
  el.className = `p-3 rounded-lg text-xs font-bold text-center ${ok ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}`
  el.classList.remove('hidden')
  setTimeout(() => el.classList.add('hidden'), 1800)
}

async function initReport() {
  try {
    const res = await fetch('/inventory/api/metadata')
    const data = await res.json()
    allWarehouses = data.warehouses || []

    const compSelect = document.getElementById('filter-company')
    compSelect.innerHTML = data.companies.map(c => `<option value="${c}">${c}</option>`).join('')
    compSelect.selectedIndex = 0
    updateWarehouseFilter()
    refreshData()
  } catch(e) {
    console.error("Init Error:", e)
  }
}

function companyChanged() {
  currentPage = 0
  updateWarehouseFilter()
  refreshData()
}

function updateWarehouseFilter() {
  const company = document.getElementById('filter-company').value
  const whSelect = document.getElementById('filter-warehouse')
  const filtered = allWarehouses.filter(w => w.company === company)
  whSelect.innerHTML = '<option value="">All Warehouses</option>' +
    filtered.map(w => `<option value="${w.name}">${w.name}</option>`).join('')
}

async function refreshData() {
  const overlay = document.getElementById('loading-overlay')
  overlay.classList.remove('hidden')

  const company = document.getElementById('filter-company').value
  const warehouse = document.getElementById('filter-warehouse').value

  try {
    // ✅ Correct endpoint
    const res = await fetch(`/inventory/api/stock_report?company=${encodeURIComponent(company)}&warehouse=${encodeURIComponent(warehouse)}`)
    fullStockData = await res.json()
    currentPage = 0
    renderTable()
  } catch(e) {
    console.error("Fetch Error:", e)
  } finally {
    overlay.classList.add('hidden')
  }
}

function changePage(direction) {
  const totalPages = Math.ceil(filteredData.length / pageSize)
  currentPage = Math.min(Math.max(currentPage + direction, 0), totalPages - 1)
  renderTable()
}

function renderTable() {
  const wh = document.getElementById('filter-warehouse').value
  const sort = document.getElementById('sort-by').value
  const search = document.getElementById('search-box').value.toLowerCase()
  const body = document.getElementById('report-body')

  // Filter + search
  filteredData = fullStockData.filter(item => {
    const itemName = (item.item_name || "").toLowerCase()
    const itemCode = (item.item_code || "").toLowerCase()
    const matchesWh = wh === "" || item.warehouse === wh
    const matchesSearch = itemName.includes(search) || itemCode.includes(search)
    return matchesWh && matchesSearch
  })

  // Sort
  filteredData.sort((a,b) => {
    if(sort === "actual_qty" || sort === "valuation_rate") return (a[sort] || 0) - (b[sort] || 0)
    return (a[sort] || "").localeCompare(b[sort] || "")
  })

  // Pagination
  const start = currentPage * pageSize
  const pageItems = filteredData.slice(start, start + pageSize)

  if(pageItems.length === 0) {
    body.innerHTML = `<tr><td colspan="5" class="p-12 text-center text-slate-400 italic">No matching records found.</td></tr>`
  } else {
    body.innerHTML = pageItems.map((item, idx) => `
      <tr class="hover:bg-slate-50">
        <td class="px-6 py-4">
          <div class="font-bold text-slate-800">${item.item_name || "Unknown Item"}</div>
          <div class="text-[10px] font-mono text-slate-400">${item.item_code || "-"}</div>
        </td>
        <td class="px-6 py-4 text-xs text-slate-500">${item.warehouse || "-"}</td>
        <td class="px-6 py-4 text-center">
          <span class="px-3 py-1 rounded-full font-bold text-xs ${item.actual_qty<=0?'bg-red-100 text-red-600':'bg-emerald-100 text-emerald-700'}">
            ${item.actual_qty || 0}
          </span>
        </td>
        <td class="px-6 py-4 text-right">
          <div class="flex items-center justify-end gap-1">
            <span class="text-slate-400 text-xs">₱</span>
            <input
              type="number"
              step="0.01"
              min="0"
              value="${Number(item.valuation_rate || 0)}"
              id="buy-rate-${start + idx}"
              class="w-28 border border-slate-200 rounded px-2 py-1 text-right text-sm font-mono text-slate-700"
            />
          </div>
        </td>
        <td class="px-6 py-4 text-right">
          <div class="flex items-center justify-end gap-2">
            <span class="text-emerald-500 text-xs">₱</span>
            <input
              type="number"
              step="0.01"
              min="0"
              value="${Number(item.selling_price || 0)}"
              id="sell-rate-${start + idx}"
              class="w-28 border border-slate-200 rounded px-2 py-1 text-right text-sm font-mono text-emerald-700 font-bold"
            />
            <button
              type="button"
              onclick="saveRowRates('${encodeURIComponent(item.item_code || '')}', 'buy-rate-${start + idx}', 'sell-rate-${start + idx}', this)"
              class="px-3 py-1 rounded bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold"
            >
              Save
            </button>
          </div>
        </td>
      </tr>
    `).join('')
  }

  // Update pagination display
  const rangeStart = filteredData.length === 0 ? 0 : start + 1
  const rangeEnd = Math.min(start + pageSize, filteredData.length)
  document.getElementById('range-start').innerText = rangeStart
  document.getElementById('range-end').innerText = rangeEnd
  document.getElementById('prev-btn').disabled = currentPage === 0
}

async function saveRate(encodedItemCode, priceType, value, inputEl) {
  const itemCode = decodeURIComponent(encodedItemCode || '')
  const num = Number(value)
  if (!itemCode || Number.isNaN(num) || num < 0) {
    showRateStatus('Invalid rate value.', false)
    return
  }

  const previous = priceType === 'buying' ? (fullStockData.find(r => r.item_code === itemCode)?.valuation_rate ?? 0) : (fullStockData.find(r => r.item_code === itemCode)?.selling_price ?? 0)
  inputEl.disabled = true
  try {
    const res = await fetch('/inventory/api/item_rate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        item_code: itemCode,
        price_type: priceType,
        rate: num
      })
    })
    const result = await res.json()
    if (!res.ok) {
      inputEl.value = previous
      showRateStatus(result.message || 'Failed to save rate.', false)
      return
    }

    // Keep table data synchronized for all rows with the same item code.
    fullStockData.forEach(row => {
      if (row.item_code === itemCode) {
        if (priceType === 'buying') row.valuation_rate = num
        if (priceType === 'selling') row.selling_price = num
      }
    })
    showRateStatus(`${itemCode}: ${priceType} rate saved.`)
  } catch (e) {
    inputEl.value = previous
    showRateStatus(`Save failed: ${e.message}`, false)
  } finally {
    inputEl.disabled = false
  }
}

async function saveRowRates(encodedItemCode, buyInputId, sellInputId, btnEl) {
  const buyInput = document.getElementById(buyInputId)
  const sellInput = document.getElementById(sellInputId)
  const itemCode = decodeURIComponent(encodedItemCode || '')
  if (!buyInput || !sellInput || !itemCode) return

  const buying = Number(buyInput.value)
  const selling = Number(sellInput.value)
  if (Number.isNaN(buying) || Number.isNaN(selling) || buying < 0 || selling < 0) {
    showRateStatus('Buying/Selling rates must be valid positive numbers.', false)
    return
  }

  // Compare against the row's own last saved values so we only send changed fields.
  const prevBuying = Number(buyInput.defaultValue || 0)
  const prevSelling = Number(sellInput.defaultValue || 0)
  const buyingChanged = buying !== prevBuying
  const sellingChanged = selling !== prevSelling

  if (!buyingChanged && !sellingChanged) {
    showRateStatus('No rate changes to save.')
    return
  }

  btnEl.disabled = true
  buyInput.disabled = true
  sellInput.disabled = true

  try {
    if (buyingChanged) {
      const buyRes = await fetch('/inventory/api/item_rate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ item_code: itemCode, price_type: 'buying', rate: buying })
      })
      const buyJson = await buyRes.json()
      if (!buyRes.ok) throw new Error(buyJson.message || 'Failed to save buying rate')
    }

    if (sellingChanged) {
      const sellRes = await fetch('/inventory/api/item_rate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ item_code: itemCode, price_type: 'selling', rate: selling })
      })
      const sellJson = await sellRes.json()
      if (!sellRes.ok) throw new Error(sellJson.message || 'Failed to save selling rate')
    }

    fullStockData.forEach(row => {
      if (row.item_code === itemCode) {
        if (buyingChanged) row.valuation_rate = buying
        if (sellingChanged) row.selling_price = selling
      }
    })
    if (buyingChanged) buyInput.defaultValue = String(buying)
    if (sellingChanged) sellInput.defaultValue = String(selling)
    if (buyingChanged && sellingChanged) showRateStatus(`${itemCode}: buying and selling rates saved.`)
    else if (buyingChanged) showRateStatus(`${itemCode}: buying rate saved.`)
    else showRateStatus(`${itemCode}: selling rate saved.`)
  } catch (e) {
    showRateStatus(e.message || 'Failed to save rates.', false)
  } finally {
    btnEl.disabled = false
    buyInput.disabled = false
    sellInput.disabled = false
  }
}
</script>
<script src="/static/idle-timeout.js"></script>
<script>
initInactivityLogout(30)
</script>

</body>
</html>
